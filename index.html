<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>当年沧海official粉丝纯度测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app" aria-label="当年沧海official粉丝纯度测试">
    <section class="card" id="quizCard" aria-live="polite">
      <header class="card__header">
        <div class="cardTitle">当年沧海official粉丝纯度测试</div>
        <div class="progress" id="progress">题号：1/10</div>
      </header>

      <div class="card__body">
        <div class="question" id="question">加载中...</div>
      </div>

      <div class="card__footer">
        <div class="options" id="options" role="group" aria-label="选项"></div>
      </div>
    </section>

    <section class="card card--result is-hidden" id="resultCard" aria-live="polite">
      <div class="resultTitle">测试完成！</div>
      <div class="meter" aria-label="分数进度条">
        <div class="meter__fill" id="meterFill" style="width: 0%"></div>
      </div>
      <div class="resultScore" id="finalScore">你的最终得分是：0 / 10</div>
      <div class="resultLevel" id="resultLevel">粉丝纯度评级：-</div>
      <div class="resultComment" id="resultComment">评语加载中...</div>
      <button class="btn btn--primary" id="restartBtn" type="button">重新开始</button>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
